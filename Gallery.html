<!DOCTYPE html>
<html>
<head>
  <title>Media Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">

    <nav>
      <a href="index.html">Dashboard</a>
      <a href="calc.html">Calculation Page</a>
      <a href="gallery.html">Media Vault</a>
    </nav>

    <h2>Interactive Image Console</h2>

    <img id="console-graphic" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/960px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg" width="300">
    <p id="image-text">This device is currently turned off.</p>

    <button onclick="activateComponent()">Activate Component</button>
    <button onclick="deactivateComponent()">Deactivate Component</button>

    <p id="secret-token-box" hidden>🔑 SYSTEM RECOVERY PASSPHRASE: Alpha-Bravo-992</p>
    <button onclick="revealKeys()">Reveal System Code Keys</button>

  </div>

  <script>
    function activateComponent() {
      document.getElementById("console-graphic").src = "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400";
      document.getElementById("image-text").textContent = "This device is now turned on.";
    }

    function deactivateComponent() {
      document.getElementById("console-graphic").src = "https://images.unsplash.com/photo-1517732306149-e8f829eb588a?w=400";
      document.getElementById("image-text").textContent = "This device is currently turned off.";
    }

    function revealKeys() {
      document.getElementById("secret-token-box").hidden = false;
    }
  </script>

</body>
</html>
